# GGM Linked Data-stack voor Portainer (build method: Repository).
# Env-vars invullen in Portainer bij de stack; zie stack.env.example.
services:
  virtuoso:
    image: openlink/virtuoso-opensource-7:latest
    restart: unless-stopped
    environment:
      DBA_PASSWORD: ${DBA_PASSWORD:?zet DBA_PASSWORD in de stack-env}
      # Vuistregel: NumberOfBuffers = (RAM_voor_virtuoso_in_bytes * 0,66) / 8000.
      # 340000 ~ 2,7 GB (veilig klein). Voor een 32 GB host: 1360000.
      VIRT_Parameters_NumberOfBuffers: ${VIRT_BUFFERS:-340000}
      VIRT_Parameters_MaxDirtyBuffers: ${VIRT_DIRTY:-250000}
      VIRT_Parameters_DirsAllowed: ".,/database,/data"
    volumes:
      - virtuoso-data:/database
      - ./data:/data:ro
    # Poorten 1111 (isql) en 8890 (http) blijven intern; alleen Caddy geeft
    # /sparql publiek door. Bewust geen 'ports:' hier.

  # One-shot importer: draait bij elke (re)deploy, laadt data/ en stopt.
  loader:
    image: openlink/virtuoso-opensource-7:latest
    depends_on:
      - virtuoso
    restart: "no"
    entrypoint: ["/bin/sh", "/loader/load.sh"]
    environment:
      DBA_PASSWORD: ${DBA_PASSWORD:?zet DBA_PASSWORD in de stack-env}
      GRAPH_BASE: ${GRAPH_BASE:-https://lod.gemeentelijkgegevensmodel.nl/graph}
      VIRTUOSO_HOST: virtuoso
    volumes:
      - ./data:/data:ro
      - ./loader:/loader:ro

  # Generieke verkenner. Later inruilen voor de frontend van Ashkan:
  # vervang 'build: ./frontend' door 'image: <zijn-image>' en zet
  # FRONTEND_PORT op zijn luisterpoort.
  frontend:
    build: ./frontend
    restart: unless-stopped

  caddy:
    build: ./caddy
    restart: unless-stopped
    # Draait achter een externe (systeem-)nginx die TLS termineert. Caddy pakt
    # dus GEEN 80/443 en doet GEEN eigen TLS; het luistert plat op :80 en wordt
    # alleen op localhost gepubliceerd, waar nginx naartoe proxyt (HTTP_BIND).
    # De Caddyfile zit ín het image (caddy/Dockerfile), niet als bind-mount:
    # een single-file bind-mount uit de gekloonde repo faalt in Portainer.
    ports:
      - "${HTTP_BIND:-127.0.0.1:8000}:80"
    environment:
      FRONTEND_PORT: ${FRONTEND_PORT:-80}

volumes:
  virtuoso-data:
